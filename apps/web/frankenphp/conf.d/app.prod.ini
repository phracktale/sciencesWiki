; Réglages PHP de production — SciencesWiki front web.
expose_php = Off
date.timezone = UTC

; Dépôt d'études (PDF) : les articles scientifiques dépassent souvent 2 Mo (défaut PHP).
; Sans ces limites, l'upload était rejeté silencieusement (tmp_name vide) → erreur
; « Path must not be empty » à la construction du multipart.
upload_max_filesize = 40M
post_max_size = 48M
memory_limit = 256M

opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

apc.enable_cli = 1

realpath_cache_size = 4096K
realpath_cache_ttl = 600
