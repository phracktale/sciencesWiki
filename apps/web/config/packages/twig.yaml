    globals:
        admin_csrf: '@App\Service\AdminCsrf'
        admin_session: '@App\Service\AdminApiClient'
        current_user: '@App\Service\UserApiClient'
        csp_nonce: '@App\Service\CspNonce'
        pdf_assets: '@App\Service\PdfAssets'
        # Tag de version affiché en pied de page. À BUMPER à chaque livraison.
        app_version: 'v0.57 · PDF revue : date (X118 Y818) + n° page au pied, DejaVuSans 8.5pt #64748B (2026-06-22)'

when@test:
    twig:
        strict_variables: true
