twig:
    file_name_pattern: '*.twig'
    globals:
        admin_csrf: '@App\Service\AdminCsrf'
        admin_session: '@App\Service\AdminApiClient'
        current_user: '@App\Service\UserApiClient'
        csp_nonce: '@App\Service\CspNonce'
        pdf_assets: '@App\Service\PdfAssets'
        # Thème visuel courant ('legacy' | 'crt'), piloté depuis le back-office.
        site_theme: '@App\Service\ThemeService'
        # Tag de version affiché en pied de page (visible des visiteurs).
        # GARDER COURT : numéro + date uniquement, JAMAIS de description technique.
        app_version: 'v0.67 · 28 juin 2026'

when@test:
    twig:
        strict_variables: true
