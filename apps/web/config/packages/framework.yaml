# see https://symfony.com/doc/current/reference/configuration/framework.html
parameters:
    # Défaut inoffensif si la variable n'est pas fournie (build, dev) ; en prod
    # le compose injecte les plages privées du homelab (proxy nginx Heimdall).
    env(TRUSTED_PROXIES): '127.0.0.1'

framework:
    secret: '%env(APP_SECRET)%'

    # Derrière le reverse-proxy nginx (Heimdall) qui termine le TLS.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    # Session du back-office : 8 h (journée de travail) pour ne pas redemander le
    # login toutes les ~20 min (défaut PHP gc_maxlifetime), sans session interminable.
    session:
        cookie_lifetime: 28800
        gc_maxlifetime: 28800
        cookie_secure: auto
        cookie_samesite: lax

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
