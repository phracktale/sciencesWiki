; Réglages PHP de production — SciencesWiki API.
expose_php = Off
date.timezone = UTC

; Mémoire : les commandes CLI lourdes (ingestion snapshot des partitions récentes
; très denses, flush Doctrine) dépassaient la limite par défaut (128M) → OOM. 1 Go
; couvre CLI ET web une fois pour toutes (plus besoin de -d memory_limit par commande).
memory_limit = 1024M

; OPcache (code figé en prod : pas de revalidation des timestamps).
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0

; APCu (cache métadonnées Doctrine / pools Symfony).
apc.enable_cli = 1

realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Upload (sources déposées éventuelles) — aligné sur client_max_body_size nginx.
upload_max_filesize = 25M
post_max_size = 25M
