framework:
    messenger:
        failure_transport: failed

        transports:
            # Traitement asynchrone des travaux moissonnés (cf. Phase 1 §4).
            harvester:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
            # File dédiée au texte intégral (PDF→GROBID→vecteurs), drainée par un
            # pool de workers séparé → ne bloque pas la moisson.
            fulltext:
                dsn: 'doctrine://default?queue_name=fulltext'
                retry_strategy:
                    max_retries: 2
                    delay: 5000
                    multiplier: 3
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Harvester\Message\ProcessWork: harvester
            App\Harvester\Message\ResolveOpenAccess: harvester
            App\Harvester\Message\HarvestRubric: harvester
            App\Harvester\Message\IngestFulltext: fulltext
            # Analyse « controverses & pistes » d'un nœud (cf. spec controverses §7bis).
            App\Analysis\Message\AnalyzeNodeMessage: harvester

