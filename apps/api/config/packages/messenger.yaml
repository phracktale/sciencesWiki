framework:
    messenger:
        failure_transport: failed

        transports:
            # Traitement asynchrone des travaux moissonnés (cf. Phase 1 §4).
            harvester:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
            # File dédiée au texte intégral (PDF→GROBID→vecteurs), drainée par un
            # pool de workers séparé → ne bloque pas la moisson.
            fulltext:
                dsn: 'doctrine://default?queue_name=fulltext'
                retry_strategy:
                    max_retries: 2
                    delay: 5000
                    multiplier: 3
            # File dédiée à l'analyse « controverses & pistes » d'un nœud. SÉPARÉE de
            # la moisson (sinon le job d'analyse est affamé derrière des milliers de
            # messages de moisson). redeliver_timeout très long : un run peut durer
            # >1 h sur un gros nœud, on ne veut pas qu'il soit re-livré en double.
            analysis:
                dsn: 'doctrine://default?queue_name=analysis&redeliver_timeout=14400'
                retry_strategy:
                    max_retries: 1
                    delay: 10000
            # File dédiée à la détection plagiat/doublons (empreintes MinHash/LSH + scan).
            # Isolée comme analysis : un scan lourd ne doit ni affamer la moisson ni l'inverse.
            plagiarism:
                dsn: 'doctrine://default?queue_name=plagiarism&redeliver_timeout=7200'
                retry_strategy:
                    max_retries: 1
                    delay: 10000
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Harvester\Message\ProcessWork: harvester
            App\Harvester\Message\ResolveOpenAccess: harvester
            App\Harvester\Message\HarvestRubric: harvester
            App\Harvester\Message\IngestFulltext: fulltext
            # Analyse « controverses & pistes » d'un nœud (cf. spec controverses §7bis).
            # File DÉDIÉE (pas harvester) pour ne pas être affamée par la moisson.
            App\Analysis\Message\AnalyzeNodeMessage: analysis
            # (Re)génération d'article wiki à la demande (bouton admin du wiki public) :
            # tâche LLM longue au niveau nœud → même file isolée que l'analyse.
            App\Harvester\Message\GenerateNodeArticle: analysis
            # Évaluation AXIS d'une publication à la demande (outil recherche/pédagogie) :
            # appel LLM ~1 min → asynchrone sur la même file isolée.
            App\Analysis\Message\AppraisePublicationMessage: analysis
            # Détection du devis d'une étude (→ outils d'évaluation applicables) : appel
            # LLM léger, asynchrone, pour préparer les boutons d'outils à la recherche.
            App\Analysis\Message\ClassifyStudyMessage: analysis
            # Détection plagiat/doublons (cf. docs/spec-plagiat.md §7).
            App\Analysis\Plagiarism\Message\FingerprintPublication: plagiarism
            App\Analysis\Plagiarism\Message\ScanPublication: plagiarism

