framework:
    messenger:
        failure_transport: failed

        transports:
            # Traitement asynchrone des travaux moissonnés (cf. Phase 1 §4).
            harvester:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 2000
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        routing:
            App\Harvester\Message\ProcessWork: harvester
            App\Harvester\Message\ResolveOpenAccess: harvester

