# see https://symfony.com/doc/current/reference/configuration/framework.html
parameters:
    # Défaut inoffensif si la variable n'est pas fournie (build, dev) ; en prod
    # le compose injecte les plages privées du homelab (proxy nginx Heimdall).
    env(TRUSTED_PROXIES): '127.0.0.1'
    # Hôtes de confiance (anti Host spoofing / cache poisoning). Vide = aucune
    # restriction (dev/build) ; en prod, régler p.ex. « ^(.*\.)?scienceswiki\.eu$ ».
    env(TRUSTED_HOSTS): ''

framework:
    secret: '%env(APP_SECRET)%'

    # Derrière le reverse-proxy nginx (Heimdall) qui termine le TLS : on fait
    # confiance aux en-têtes X-Forwarded-* pour reconstituer scheme/host/IP.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']
    # Rejette toute requête dont l'en-tête Host ne correspond pas (si TRUSTED_HOSTS défini).
    trusted_hosts: '%env(TRUSTED_HOSTS)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
