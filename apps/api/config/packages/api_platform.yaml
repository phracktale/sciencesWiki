api_platform:
    title: SciencesWiki API
    version: 0.1.0
    # JSON simple (front/Flutter) + JSON-LD/Hydra (hypermédia).
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']
    docs_formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        html: ['text/html']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

# En production, on n'expose PAS la documentation interactive (Swagger UI / doc HTML
# Hydra) : réduction de la fuite d'information sur la structure de l'API. Les formats
# de données (JSON, JSON-LD) restent disponibles pour les clients.
when@prod:
    api_platform:
        enable_docs: false
        enable_swagger_ui: false
        enable_re_doc: false
