security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Provider basé sur l'entité User (identifiant = email).
    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    # Hiérarchie des rôles (cf. spec §4).
    # ROLE_AUTEUR = générique (contributeur identifié produisant du contenu) ;
    # ROLE_RESEARCHER (chercheur, outils de recherche) et ROLE_REDACTEUR (éditeur
    # wiki) en héritent.
    role_hierarchy:
        ROLE_AUTEUR:      [ROLE_USER]
        ROLE_RESEARCHER:  [ROLE_AUTEUR]
        ROLE_REDACTEUR:   [ROLE_AUTEUR]
        # Espaces pédagogiques : élève (outils de base), enseignant (= élève + gestion de classe).
        ROLE_STUDENT:     [ROLE_USER]
        ROLE_TEACHER:     [ROLE_STUDENT]
        ROLE_COMITE:      [ROLE_REDACTEUR]
        ROLE_MODERATEUR:  [ROLE_REDACTEUR]
        ROLE_ADMIN:       [ROLE_MODERATEUR, ROLE_COMITE, ROLE_RESEARCHER, ROLE_TEACHER]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Connexion : email + mot de passe -> jeton JWT.
        login:
            pattern: ^/api/login_check$
            stateless: true
            json_login:
                check_path: api_login_check
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Endpoint RAG chat (Open WebUI, compatible OpenAI) : HORS firewall JWT.
        # Open WebUI envoie un Bearer (sa clé OpenAI) qui n'est PAS un JWT ; sous le
        # firewall « api » (jwt), ce Bearer invalide déclencherait un 401 malgré le
        # PUBLIC_ACCESS. L'accès est géré dans RagChatController (RAG_API_TOKEN optionnel).
        rag_chat:
            pattern: ^/api/rag
            stateless: true
            security: false

        # API : authentification par jeton JWT (anonyme autorisé pour la lecture).
        api:
            pattern: ^/api
            stateless: true
            provider: app_users
            jwt: ~

    # Lecture publique ; /api/me et écritures/admin exigent un rôle.
    access_control:
        - { path: ^/api/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/class/join, roles: PUBLIC_ACCESS }      # accepter une invitation (token)
        # Outils réservés aux espaces recherche/pédagogie (déclenchement AXIS / RoB 2 à la demande).
        - { path: ^/api/me/axis, roles: [ROLE_RESEARCHER, ROLE_TEACHER, ROLE_STUDENT] }
        - { path: ^/api/me/rob2, roles: [ROLE_RESEARCHER, ROLE_TEACHER, ROLE_STUDENT] }
        - { path: ^/api/me, roles: ROLE_USER }
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api/literature-reviews, roles: ROLE_RESEARCHER }
        - { path: ^/api, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
