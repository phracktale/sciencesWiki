security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Provider basé sur l'entité User (identifiant = email).
    providers:
        app_users:
            entity:
                class: App\Entity\User
                property: email

    # Hiérarchie des rôles (cf. spec §4).
    role_hierarchy:
        ROLE_REDACTEUR:   [ROLE_USER]
        ROLE_COMITE:      [ROLE_REDACTEUR]
        ROLE_MODERATEUR:  [ROLE_REDACTEUR]
        ROLE_ADMIN:       [ROLE_MODERATEUR, ROLE_COMITE]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_users
            # Authentificateurs (login form / JWT) à activer avec les endpoints d'auth.

    # Lecture publique ; les écritures/admin exigeront un rôle (endpoints à venir).
    access_control:
        # - { path: ^/api/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
