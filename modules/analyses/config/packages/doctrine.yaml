doctrine:
    dbal:
        # BASE PARTAGÉE SciencesWiki. Le module ne crée/migre QUE ses tables analys_*.
        url: '%env(resolve:DATABASE_URL)%'
        profiling_collect_backtrace: '%kernel.debug%'
        # Type pgvector (corpus SW : vector(384)) pour la recherche de similarité.
        types:
            vector: Pgvector\Doctrine\VectorType
        mapping_types:
            vector: vector
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        dql:
            numeric_functions:
                cosine_distance: Pgvector\Doctrine\CosineDistance
                l2_distance: Pgvector\Doctrine\L2Distance
        mappings:
            Analyses:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'Analyses\Entity'
                alias: Analyses

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool
    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
