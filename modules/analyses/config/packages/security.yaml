security:
    # Hiérarchie des rôles RÉPLIQUÉE depuis SciencesWiki (apps/api/config/packages/security.yaml).
    # Indispensable : le JWT ne porte que les rôles DÉCLARÉS de l'utilisateur (ex. un admin =
    # [ROLE_USER, ROLE_ADMIN]). Sans cette hiérarchie, ROLE_ADMIN n'impliquerait pas
    # ROLE_RESEARCHER/ROLE_COMITE et l'admin serait refusé (403) sur la section « use ».
    role_hierarchy:
        ROLE_AUTEUR:      [ROLE_USER]
        ROLE_RESEARCHER:  [ROLE_AUTEUR]
        ROLE_REDACTEUR:   [ROLE_AUTEUR]
        ROLE_STUDENT:     [ROLE_USER]
        ROLE_TEACHER:     [ROLE_STUDENT]
        ROLE_COMITE:      [ROLE_REDACTEUR]
        ROLE_MODERATEUR:  [ROLE_REDACTEUR]
        ROLE_ADMIN:       [ROLE_MODERATEUR, ROLE_COMITE, ROLE_RESEARCHER, ROLE_TEACHER]

    # Le module NE délivre PAS de token : il VALIDE ceux émis par SciencesWiki
    # (clé publique partagée). L'utilisateur est reconstruit depuis les claims du JWT
    # (identifiant + rôles), sans table utilisateur locale.
    providers:
        jwt:
            lexik_jwt:
                class: Lexik\Bundle\JWTAuthenticationBundle\Security\User\JWTUser

    firewalls:
        health:
            pattern: ^/health
            security: false
        api:
            pattern: ^/
            stateless: true
            provider: jwt
            jwt: ~

    # Accès par section (cf. manifeste module.yaml).
    access_control:
        - { path: ^/health, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }              # section admin (globale)
        # Section « review » : corriger un critère / valider → ROLE_COMITE.
        - { path: '^/analyses/[^/]+/(validate|criteria)', roles: ROLE_COMITE, methods: [POST, PATCH] }
        - { path: ^/, roles: [ROLE_RESEARCHER, ROLE_COMITE] } # section use
