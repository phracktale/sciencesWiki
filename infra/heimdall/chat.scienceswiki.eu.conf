# =============================================================================
# chat.scienceswiki.eu — Open WebUI (assistant RAG SciencesWiki)
# Heimdall (192.168.1.195)  →  conteneur openwebui sur Thor (192.168.1.36:8092)
#
# SSO « forward-auth » : on délègue l'authentification au front (qui détient la
# session JWT). Si non connecté → redirection vers la connexion. Open WebUI est
# joignable UNIQUEMENT via ce proxy ; on EFFACE tout X-SW-Auth-* entrant et on ne
# pose que la valeur de confiance issue du front (anti-usurpation).
# Cf. docs/spec-openwebui-rag.md.
#
# PRÉ-REQUIS (go-live) :
#   1. DNS : chat.scienceswiki.eu  A  192.168.1.195 (Heimdall)
#   2. Cert : sudo certbot certonly --webroot -w /var/www/letsencrypt -d chat.scienceswiki.eu
#   3. Front : SESSION_COOKIE_DOMAIN=.scienceswiki.eu (compose web) + redéploiement web
#   4. Open WebUI : WEBUI_AUTH_TRUSTED_EMAIL_HEADER=X-SW-Auth-Email (cf. compose, retirer WEBUI_AUTH=false)
#   5. sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# WebSocket (socket.io d'Open WebUI) : bascule Connection selon Upgrade.
map $http_upgrade $owui_connection { default upgrade; '' close; }

# ── HTTP → HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name chat.scienceswiki.eu;

    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.scienceswiki.eu;

    ssl_certificate         /etc/letsencrypt/live/chat.scienceswiki.eu/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/chat.scienceswiki.eu/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/chat.scienceswiki.eu/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Forward-auth : sous-requête au front (la session voyage via le cookie,
    #    partagé sur .scienceswiki.eu). 200 ⇒ autorisé + en-têtes d'identité.
    location = /_owui_auth {
        internal;
        proxy_pass http://192.168.1.36:8090/auth/openwebui;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host           scienceswiki.eu;
        proxy_set_header Cookie         $http_cookie;
        proxy_set_header X-Forwarded-Proto https;
    }

    location @owui_login {
        return 302 https://scienceswiki.eu/fr/connexion?back=https://chat.scienceswiki.eu/;
    }

    location / {
        auth_request /_owui_auth;
        auth_request_set $owui_email $upstream_http_x_sw_auth_email;
        auth_request_set $owui_name  $upstream_http_x_sw_auth_name;
        error_page 401 = @owui_login;

        proxy_pass http://192.168.1.36:8092;

        # Anti-usurpation : on impose les valeurs de confiance (écrase tout en-tête client).
        proxy_set_header X-SW-Auth-Email $owui_email;
        proxy_set_header X-SW-Auth-Name  $owui_name;

        # WebSocket + SSE (streaming) : upgrade, pas de tampon, timeouts longs.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $owui_connection;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
