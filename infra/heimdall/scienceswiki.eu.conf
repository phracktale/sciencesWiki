# =============================================================================
# scienceswiki.eu — Nginx vhost
# Heimdall (192.168.1.195)  →  pile Docker SciencesWiki sur Thor (192.168.1.36)
#
#   /        -> front public Symfony/Twig (conteneur web,  Thor:8080)
#   /api     -> API Symfony / API Platform (conteneur api, Thor:8000)
#
# Aligné sur la convention homelab (Let's Encrypt, challenge ACME, en-têtes).
# Cert à obtenir au préalable :
#   sudo certbot certonly --webroot -w /var/www/letsencrypt -d scienceswiki.eu
# =============================================================================

upstream scienceswiki_web { server 192.168.1.36:8090; keepalive 16; }
upstream scienceswiki_api { server 192.168.1.36:8000; keepalive 16; }

# ── HTTP → HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name scienceswiki.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    # HTTP/2 via la directive listen (nginx < 1.25 ; cohérent avec les autres vhosts).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scienceswiki.eu;

    ssl_certificate         /etc/letsencrypt/live/scienceswiki.eu/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/scienceswiki.eu/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/scienceswiki.eu/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── En-têtes de sécurité (spec §10.1) ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # CSP : le front s'appuie largement sur du JS/CSS inline → 'unsafe-inline' conservé,
    # mais on verrouille les ORIGINES (seul Plausible auto-hébergé est autorisé en
    # script/connect), le clickjacking (frame-ancestors), base-uri et l'exfiltration
    # de formulaire (form-action). Mercure + /api sont en même origine ('self').
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://analytics.phracktale.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://analytics.phracktale.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Dépôts de sources éventuels (aligné sur upload_max_filesize PHP).
    client_max_body_size 25m;

    # En-têtes de proxy (scheme/host/IP réels pour Symfony derrière le proxy).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header Connection        "";

    # API (inclut /api/login_check, /api/search, /api/me, …)
    # /api exact ET tout /api/... vont à l'API : sinon le /api nu tombe sur
    # location / (front) → boucle de redirection /api ↔ /api/.
    location = /api {
        proxy_pass http://scienceswiki_api;
    }
    location /api/ {
        proxy_pass http://scienceswiki_api;
        # Streaming SSE (rédaction « lettre par lettre ») : pas de tampon, timeout long.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Front public
    location / {
        proxy_pass http://scienceswiki_web;
    }
}
