# =============================================================================
# scienceswiki.phracktale.com — Nginx vhost
# Heimdall (192.168.1.195)  →  pile Docker SciencesWiki sur Thor (192.168.1.36)
#
#   /        -> front public Symfony/Twig (conteneur web,  Thor:8080)
#   /api     -> API Symfony / API Platform (conteneur api, Thor:8000)
#
# Aligné sur la convention homelab (Let's Encrypt, challenge ACME, en-têtes).
# Cert à obtenir au préalable :
#   sudo certbot certonly --webroot -w /var/www/letsencrypt -d scienceswiki.phracktale.com
# =============================================================================

upstream scienceswiki_web { server 192.168.1.36:8080; keepalive 16; }
upstream scienceswiki_api { server 192.168.1.36:8000; keepalive 16; }

# ── HTTP → HTTPS ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name scienceswiki.phracktale.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name scienceswiki.phracktale.com;

    ssl_certificate         /etc/letsencrypt/live/scienceswiki.phracktale.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/scienceswiki.phracktale.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/scienceswiki.phracktale.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── En-têtes de sécurité (spec §10.1) ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Dépôts de sources éventuels (aligné sur upload_max_filesize PHP).
    client_max_body_size 25m;

    # En-têtes de proxy (scheme/host/IP réels pour Symfony derrière le proxy).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;
    proxy_set_header Connection        "";

    # API (inclut /api/login_check, /api/search, /api/me, …)
    location /api/ {
        proxy_pass http://scienceswiki_api;
    }

    # Front public
    location / {
        proxy_pass http://scienceswiki_web;
    }
}
