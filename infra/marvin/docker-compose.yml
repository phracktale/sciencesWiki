# SciencesWiki — nœud IA « Marvin » (192.168.1.171).
#
# Ce compose ne gère que le service d'embeddings (ml/). Le LLM est servi par
# Ollama, déjà installé nativement sur Marvin (port 11434).
#
# Déploiement : voir infra/marvin/deploy.sh (git clone sur Marvin + build ici).
# Lancer depuis ce dossier : `docker compose up -d --build`.
# Le service écoute sur 8001 ; l'API de Thor le joint via ML_EMBED_URL.
#
# Marvin héberge aussi désormais la BASE PostgreSQL/pgvector (données sur /data,
# le gros disque). L'api/worker de Thor s'y connectent via le réseau privé
# (DB_HOST=192.168.1.171). Données = bind-mount /data/scienceswiki-pgdata (pas un
# volume Docker, qui irait sur le disque système). Nécessite infra/marvin/.env
# avec POSTGRES_USER/DB/PASSWORD (mêmes valeurs que Thor). NON exposé sur Internet.
name: scienceswiki-ml

services:
  database:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Perf : la base vivant sur /data, on profite des 128 Go de RAM.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /data/scienceswiki-pgdata:/var/lib/postgresql/data:rw
    ports:
      # Lié explicitement à l'IP LAN de Marvin (pas 0.0.0.0) → non exposé sur
      # d'éventuelles interfaces WAN/WiFi. Thor s'y connecte par le réseau privé.
      - "192.168.1.171:5432:5432"
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # GROBID : extraction structurée (TEI) des PDF scientifiques. Modèles CRF inclus
  # dans l'image (CPU, pas de GPU). Exposé sur le LAN ; l'ingesteur de Thor l'appelle
  # via GROBID_URL=http://192.168.1.171:8070. Cohabite avec embeddings/Ollama (128 Go).
  grobid:
    image: grobid/grobid:0.8.1
    environment:
      # Borne mémoire JVM (large marge sur 128 Go) + concurrence raisonnable.
      JAVA_OPTS: "-Xmx6g"
    ports:
      - "192.168.1.171:8070:8070"
    restart: unless-stopped

  embeddings:
    build:
      # ml/ est à la racine du dépôt ; ce compose vit dans infra/marvin/.
      context: ../../ml
      dockerfile: Dockerfile
    image: scienceswiki-ml:latest
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSIONS: "384"
      # Batch plus large sur GPU (VRAM abondante) : débit de vectorisation nettement
      # supérieur pour la moisson fulltext. Sans GPU, l'app retombe seule sur le CPU.
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-128}
    # GPU DÉSACTIVÉ temporairement : la 3090 (eGPU OCuLink) décroche du bus sous charge
    # (Xid 79 « GPU has fallen off the bus » → Xid 154 reboot requis). Tant que l'OCuLink
    # n'est pas fiabilisé (alim du dock / câble / pcie_aspm=off), on NE hard-requiert PAS le
    # GPU ici, sinon le conteneur casse à chaque décrochage. Le code (ml/app.py) bascule seul
    # sur CUDA si un GPU est visible — donc réactiver = juste ré-ajouter le bloc deploy ci-dessous.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    ports:
      # Lié explicitement à l'IP LAN de Marvin (pas 0.0.0.0) → jamais exposé sur une
      # interface WAN/WiFi. Ce service n'a AUCUNE authentification : le bind LAN est
      # sa seule protection. Thor le joint par le réseau privé (ML_EMBED_URL).
      - "192.168.1.171:8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8001/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Garde-fou anti-hallucination : HHEM-2.1-Open (Vectara), détecteur NLI dédié (FR/EN/DE).
  # L'API de Thor le joint via HHEM_URL pour scorer l'entailment réponse↔passages.
  hhem:
    build:
      context: ../../ml/hhem
      dockerfile: Dockerfile
    image: scienceswiki-hhem:latest
    # GPU DÉSACTIVÉ temporairement (cf. embeddings) : eGPU OCuLink instable (Xid 79).
    # HHEM repart seul sur CPU (ml/hhem/app.py). Réactiver = ré-ajouter le bloc deploy.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    ports:
      # Lié explicitement à l'IP LAN de Marvin (pas 0.0.0.0). Service sans authentification :
      # le bind LAN est sa seule protection. Thor le joint par le réseau privé (HHEM_URL).
      - "192.168.1.171:8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped
