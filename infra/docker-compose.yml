# SciencesWiki — pile applicative du homelab (nœud « Thor »).
#
#   database  : PostgreSQL + pgvector (embeddings)
#   api       : Symfony 8 / API Platform (FrankenPHP)  — init: migrations, JWT, seed
#   worker    : même image que l'api, consomme la file Messenger (moisson async)
#   web       : front public Symfony/Twig (FrankenPHP), client de l'API
#
# Le TLS et l'exposition publique sont assurés par nginx sur « Heimdall »
# (cf. infra/heimdall/scienceswiki.conf). L'IA (embeddings + LLM) tourne sur
# « Marvin » et est jointe par le réseau privé (ML_EMBED_URL, LLM_BASE_URL).
#
# Démarrage :  docker compose --env-file .env.prod up -d --build
name: scienceswiki

# Durcissement runtime commun aux conteneurs applicatifs (défense en profondeur).
#  - no-new-privileges : interdit l'escalade via binaires setuid.
#  - cap_drop ALL puis réintroduction du strict nécessaire :
#      NET_BIND_SERVICE (FrankenPHP écoute sur :80), CHOWN/SETUID/SETGID/DAC_OVERRIDE/FOWNER
#      (l'entrypoint initialise clés JWT + migrations, et l'image peut ajuster des droits).
# NB : les conteneurs tournent encore en root (image FrankenPHP par défaut). Passer en
# USER non-root (www-data) est le durcissement suivant — il exige un `chown` unique des
# volumes nommés EXISTANTS côté hôte (jwt_keys, secrets_vault, web_sessions, web_uploads),
# sinon le conteneur non-root perd l'accès en écriture. À planifier hors de ce lot.
x-app-hardening: &app-hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
    - CHOWN
    - SETUID
    - SETGID
    - DAC_OVERRIDE
    - FOWNER

services:
  # ⚠️ Base MIGRÉE sur Marvin (cf. infra/marvin). Cette base locale n'est plus
  # utilisée — conservée en ROLLBACK uniquement (volume database_data intact).
  # Ne démarre que sur demande explicite : `docker compose --profile rollback up -d database`
  # (et repasser DB_HOST=database dans .env.prod pour l'utiliser).
  database:
    image: pgvector/pgvector:pg16
    profiles: ["rollback"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    # La base est désormais sur Marvin (DB_HOST). Plus de dépendance à la base locale.
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      # DB_HOST=192.168.1.171 (Marvin) en prod ; défaut « database » = base locale Thor (rollback).
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      SERVER_NAME: ":80"
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      # Hôtes de confiance (anti Host spoofing). Régler p.ex. « ^(.*\.)?scienceswiki\.eu$ ».
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      DEFAULT_URI: ${PUBLIC_URL}
      # Jeton du endpoint RAG (/api/rag). OBLIGATOIRE en prod : sans lui, l'endpoint
      # LLM refuse tout (fail-closed). Doit être identique à l'OPENAI_API_KEY d'Open WebUI.
      RAG_API_TOKEN: ${RAG_API_TOKEN}
      # JWT (lexik) — la clé est générée au 1er démarrage dans le volume jwt_keys.
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      # Clé de déchiffrage du coffre de secrets (OPENALEX_API_KEY, BREVO_*, MAILER…).
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      # Moisson + IA (Marvin)
      HARVESTER_CONTACT_EMAIL: ${HARVESTER_CONTACT_EMAIL}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      LLM_DRIVER: ${LLM_DRIVER}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_TOKEN: ${LLM_API_TOKEN}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      # Mercure (temps réel) : l'api HÉBERGE le hub (Caddy) ET publie.
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-}
      # CORS du hub Mercure (lu par le Caddyfile). Restreindre au domaine public :
      # défaut « * » trop permissif. En prod : https://scienceswiki.eu.
      MERCURE_CORS_ORIGINS: ${MERCURE_CORS_ORIGINS:-${PUBLIC_URL:-https://scienceswiki.eu}}
      # Cette instance initialise la base (migrations + clés JWT + seed).
      RUN_INIT: "1"
    volumes:
      - jwt_keys:/app/config/jwt:rw
      # Coffre de secrets persistant (survit aux rebuilds) : clés + secrets chiffrés
      # (OPENALEX_API_KEY, BREVO_*…). Généré une fois via secrets:generate-keys.
      - secrets_vault:/app/config/secrets:rw
      # Snapshot OpenAlex en LECTURE SEULE pour l'ingestion en masse
      # (app:openalex:ingest-snapshot --dir=/openalexSnapshot). En prod (Thor) :
      # OPENALEX_SNAPSHOT_DIR=/mnt/marvin-data2/openalex-snapshot (NFS Marvin /data2).
      # Hors prod : placeholder vide pour ne pas casser le `up`.
      - ${OPENALEX_SNAPSHOT_DIR:-./.snapshot-placeholder}:/openalexSnapshot:ro
    ports:
      # Publier sur l'IP LAN de Thor (BIND_IP=192.168.1.36 en prod) pour n'être
      # joignable QUE par Heimdall, jamais sur d'éventuelles interfaces WAN/WiFi.
      # Défaut 0.0.0.0 pour ne pas casser le dev local.
      - "${BIND_IP:-0.0.0.0}:${API_PORT:-8000}:80"
    restart: unless-stopped

  worker:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      # DB_HOST=192.168.1.171 (Marvin) en prod ; défaut « database » = base locale Thor (rollback).
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      HARVESTER_CONTACT_EMAIL: ${HARVESTER_CONTACT_EMAIL}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      LLM_DRIVER: ${LLM_DRIVER}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_TOKEN: ${LLM_API_TOKEN}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
      # RUN_INIT non défini : pas de migration ici, uniquement la consommation.
    # memory_limit PHP relevé (embeddings par lots + gros lots de moisson) ; le
    # --memory-limit Messenger (RSS) redémarre proprement avant tout dépassement.
    command: ["php", "-d", "memory_limit=1024M", "bin/console", "messenger:consume", "harvester", "failed", "-v", "--time-limit=3600", "--memory-limit=1500M"]
    # Même coffre de secrets que l'api (le worker déchiffre OPENALEX_API_KEY pour la moisson).
    volumes:
      - secrets_vault:/app/config/secrets:rw
    # Le worker ne sert pas de HTTP : on neutralise le healthcheck HTTP hérité
    # de l'image FrankenPHP (sinon faux « unhealthy »).
    healthcheck:
      disable: true
    restart: unless-stopped
    # Plusieurs workers EN PARALLÈLE : plusieurs rubriques moissonnées à la fois
    # (l'insertion d'auteur est sûre en concurrence via upsert ORCID). Persistant —
    # `docker compose up` relance ce nombre sans avoir à repasser --scale.
    # Relevé à 6 : OpenAlex est sous-exploité (~0,35 req/s pour 10 req/s permis) ;
    # le débit est borné par le traitement DB → plus de workers = plus d'insertions.
    deploy:
      replicas: 6

  # Pool dédié à l'ingestion du TEXTE INTÉGRAL (PDF éditeur → GROBID → vecteurs),
  # en parallèle, sans bloquer la moisson. Débit ≈ replicas × ~1 article/~20 s.
  fulltext-worker:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
    command: ["php", "-d", "memory_limit=1024M", "bin/console", "messenger:consume", "fulltext", "failed", "-v", "--time-limit=3600", "--memory-limit=1500M"]
    volumes:
      - secrets_vault:/app/config/secrets:rw
    healthcheck:
      disable: true
    restart: unless-stopped
    deploy:
      # 6 workers : le débit du texte intégral est borné par GROBID/embeddings (côté
      # Marvin), PAS par le nombre de workers (10 ne gagnait ~rien vs 6). On reste à 6
      # pour ne pas surcharger Marvin (qui héberge aussi la DB). Pour aller plus vite :
      # scaler GROBID (threads/instances), pas les workers.
      replicas: 6

  # Worker DÉDIÉ à l'analyse « controverses & pistes » d'un nœud. Isolé du pool de
  # moisson : un run d'analyse (long, borné par le LLM) ne doit pas réduire le
  # débit de moisson NI être affamé par les milliers de messages de moisson en
  # attente. Un seul exemplaire (GPU unique côté Marvin → pas de parallélisme utile).
  analysis-worker:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      LLM_DRIVER: ${LLM_DRIVER}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_TOKEN: ${LLM_API_TOKEN}
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
    # Un run d'analyse peut durer >1 h sur un gros nœud ; time-limit large pour ne
    # pas recycler le worker entre deux messages trop tôt.
    command: ["php", "-d", "memory_limit=1024M", "bin/console", "messenger:consume", "analysis", "failed", "-v", "--time-limit=21600", "--memory-limit=1500M"]
    volumes:
      - secrets_vault:/app/config/secrets:rw
    healthcheck:
      disable: true
    restart: unless-stopped

  # Worker DÉDIÉ aux évaluations à la demande (AXIS/RoB2/AMSTAR-2/MMAT + détection
  # de devis), file « appraisal ». SÉPARÉ d'analysis-worker : ces tâches sont
  # interactives (l'utilisateur attend) et ne doivent JAMAIS être coincées derrière
  # un AnalyzeNodeMessage multi-heures. Un seul exemplaire (GPU unique côté Marvin ;
  # tourner en parallèle d'analysis-worker provoque déjà des swaps de modèle ollama).
  appraisal-worker:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      LLM_DRIVER: ${LLM_DRIVER}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_TOKEN: ${LLM_API_TOKEN}
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
    # Un appraisal dure ~1-10 min : recyclage horaire standard (contrairement à
    # analysis-worker qui doit tenir un run de nœud de plusieurs heures).
    command: ["php", "-d", "memory_limit=1024M", "bin/console", "messenger:consume", "appraisal", "failed", "-v", "--time-limit=3600", "--memory-limit=1500M"]
    volumes:
      - secrets_vault:/app/config/secrets:rw
    healthcheck:
      disable: true
    restart: unless-stopped

  # Worker dédié à la RÉDACTION D'ARTICLE à la demande (pipeline 2 appels, lent) + envoi de
  # l'e-mail de notification (d'où MAILER_DSN + HARVESTER_CONTACT_EMAIL, absents des autres workers).
  article-worker:
    <<: *app-hardening
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: prod
    depends_on:
      api:
        condition: service_started
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=1"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
      SYMFONY_DECRYPTION_SECRET: ${SYMFONY_DECRYPTION_SECRET:-}
      EMBEDDING_DRIVER: http
      ML_EMBED_URL: ${ML_EMBED_URL}
      GROBID_URL: ${GROBID_URL:-}
      CORE_API_KEY: ${CORE_API_KEY:-}
      LLM_DRIVER: ${LLM_DRIVER}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_TOKEN: ${LLM_API_TOKEN}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      HARVESTER_CONTACT_EMAIL: ${HARVESTER_CONTACT_EMAIL}
      MERCURE_URL: http://api/.well-known/mercure
      MERCURE_PUBLIC_URL: ${PUBLIC_URL:-https://scienceswiki.eu}/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-}
    command: ["php", "-d", "memory_limit=1024M", "bin/console", "messenger:consume", "article", "failed", "-v", "--time-limit=3600", "--memory-limit=1500M"]
    volumes:
      - secrets_vault:/app/config/secrets:rw
    healthcheck:
      disable: true
    restart: unless-stopped

  web:
    <<: *app-hardening
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: prod
    depends_on:
      - api
    environment:
      APP_ENV: prod
      APP_SECRET: ${WEB_APP_SECRET}
      SERVER_NAME: ":80"
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      DEFAULT_URI: ${PUBLIC_URL}
      # Appel server-side de l'API via le réseau interne du compose.
      API_BASE_URL: "http://api"
      # Module « analyses » (standalone) joint en interne — façade /labo/analyses.
      ANALYS_BASE_URL: ${ANALYS_BASE_URL:-http://analyses}
      # SSO chat : « .scienceswiki.eu » pour partager la session avec chat.scienceswiki.eu
      # (forward-auth Open WebUI). Vide = host-only (défaut). À régler au go-live.
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      # Jeton de contournement du mode maintenance (prévisualisation admin). Vide = aucun.
      MAINTENANCE_BYPASS_TOKEN: ${MAINTENANCE_BYPASS_TOKEN:-}
    # Sessions + médias uploadés persistants (survivent aux rebuilds).
    volumes:
      - web_sessions:/app/var/sessions:rw
      - web_uploads:/app/public/uploads:rw
    ports:
      # Cf. api : publier sur l'IP LAN de Thor en prod (BIND_IP), pas 0.0.0.0.
      - "${BIND_IP:-0.0.0.0}:${WEB_PORT:-8080}:80"
    restart: unless-stopped

  # ── Module « analyses » (standalone) ────────────────────────────────────────
  # Application autonome (Symfony/FrankenPHP) sur la BASE SW PARTAGÉE. Ne crée/migre
  # que ses tables analys_*. Valide les JWT SW avec la clé PUBLIQUE (volume jwt_keys en
  # lecture seule). Joignable en interne par le web via http://analyses. NON publié.
  analyses:
    <<: *app-hardening
    build:
      context: ../modules/analyses
      dockerfile: Dockerfile
      target: prod
    depends_on:
      - api
    environment:
      APP_ENV: prod
      APP_SECRET: ${ANALYS_APP_SECRET:-${WEB_APP_SECRET}}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      SERVER_NAME: ":80"
      TRUSTED_PROXIES: ${TRUSTED_PROXIES}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      OLLAMA_URL: ${OLLAMA_URL:-http://192.168.1.171:11434}
      ANALYS_MODEL: ${ANALYS_MODEL:-glm-5.2:cloud}
      ANALYS_EXTRACTOR_MODEL: ${ANALYS_EXTRACTOR_MODEL:-glm-4.7-flash:latest}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      ANALYS_MAIL_FROM: ${HARVESTER_CONTACT_EMAIL:-noreply@scienceswiki.eu}
      MODULE_BASE_URL: ${PUBLIC_URL:-}/fr/labo/analyses
      # Cette instance applique les migrations analys_* (table de suivi dédiée).
      RUN_INIT: "1"
    volumes:
      - jwt_keys:/app/config/jwt:ro
    restart: unless-stopped

  # Worker du module analyses : consomme la file analys_analysis (traitement LLM async).
  analyses-worker:
    <<: *app-hardening
    build:
      context: ../modules/analyses
      dockerfile: Dockerfile
      target: prod
    depends_on:
      - analyses
    environment:
      APP_ENV: prod
      APP_SECRET: ${ANALYS_APP_SECRET:-${WEB_APP_SECRET}}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${DB_HOST:-database}:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
      OLLAMA_URL: ${OLLAMA_URL:-http://192.168.1.171:11434}
      ANALYS_MODEL: ${ANALYS_MODEL:-glm-5.2:cloud}
      ANALYS_EXTRACTOR_MODEL: ${ANALYS_EXTRACTOR_MODEL:-glm-4.7-flash:latest}
      MAILER_DSN: ${MAILER_DSN:-null://null}
      ANALYS_MAIL_FROM: ${HARVESTER_CONTACT_EMAIL:-noreply@scienceswiki.eu}
      MODULE_BASE_URL: ${PUBLIC_URL:-}/fr/labo/analyses
      RUN_WORKER: "1"
    # Le worker ne sert pas de HTTP : on neutralise le healthcheck HTTP hérité.
    healthcheck:
      disable: true
    volumes:
      - jwt_keys:/app/config/jwt:ro
    restart: unless-stopped

  # Adminer : visualisation directe de la base (accès TOTAL → jamais public).
  # Publié par DÉFAUT sur 127.0.0.1 uniquement (accès via tunnel SSH : `ssh -L`).
  # Pour un accès LAN, mettre ADMINER_BIND=192.168.1.36 ET restreindre au pare-feu.
  # Idéalement : NE PAS déployer Adminer en production (outil de debug) → profil dédié.
  adminer:
    <<: *app-hardening
    image: adminer:5
    environment:
      ADMINER_DEFAULT_SERVER: ${DB_HOST:-192.168.1.171}
      ADMINER_DESIGN: dracula
    ports:
      - "${ADMINER_BIND:-127.0.0.1}:${ADMINER_PORT:-8091}:8080"
    restart: unless-stopped

  # Open WebUI : interface de chat pour les profils connectés (cf.
  # docs/spec-openwebui-rag.md). Étape pilote : branché UNIQUEMENT sur notre
  # endpoint RAG (/api/rag/chat, via le service « api » du réseau interne) ;
  # l'API Ollama directe est désactivée (tout passe par le RAG sourcé). Exposé
  # pour l'instant sur le LAN seulement (Heimdall /chat + SSO viennent ensuite).
  openwebui:
    # TODO: épingler un tag de release après validation (cf. spec) ; « main » = pilote.
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      api:
        condition: service_started
    environment:
      # Config pilotée par ces variables (pas d'override persistant en base qui
      # garderait une vieille URL Ollama, ex. host.docker.internal). Source unique = compose.
      ENABLE_PERSISTENT_CONFIG: "false"
      # Notre endpoint RAG (compatible OpenAI) : Open WebUI y ajoute /chat/completions et /models.
      OPENAI_API_BASE_URL: "http://api/api/rag"
      # Clé envoyée en Bearer à /api/rag : DOIT être identique au RAG_API_TOKEN de l'api
      # (sinon l'api, en fail-closed, refuse). Défini dans .env.prod (pas de valeur en dur).
      OPENAI_API_KEY: ${RAG_API_TOKEN}
      # Assistant VERROUILLÉ : seul le RAG sourcé (« scienceswiki-rag-mistral »,
      # exposé par /api/rag) est disponible. On COUPE l'accès aux LLM bruts d'Ollama
      # → aucun chat non sourcé possible, et un seul modèle = pas de sélection
      # possible côté utilisateur (la demande : brider + supprimer le changement de modèle).
      ENABLE_OLLAMA_API: "false"
      OLLAMA_BASE_URL: "http://192.168.1.171:11434"
      # Modèle unique ouvert par défaut (= l'assistant RAG sourcé Mistral).
      DEFAULT_MODELS: "scienceswiki-rag-mistral"
      # SSO : l'identité vient du forward-auth Heimdall (en-têtes de confiance que
      # le proxy POSE et que le client ne peut pas usurper, cf. chat.scienceswiki.eu.conf).
      # Open WebUI retrouve/ouvre le compte d'après l'e-mail du header → pas de mot
      # de passe. ⚠️ Le port LAN :8092 n'a PAS ces en-têtes → accès direct = sans
      # identité ; à durcir au pare-feu (n'autoriser :8092 que depuis Heimdall).
      WEBUI_AUTH_TRUSTED_EMAIL_HEADER: "X-SW-Auth-Email"
      WEBUI_AUTH_TRUSTED_NAME_HEADER: "X-SW-Auth-Name"
      WEBUI_URL: "https://chat.scienceswiki.eu"
      WEBUI_NAME: "SciencesWiki — Assistant"
    volumes:
      - openwebui_data:/app/backend/data
      # Thème CRT SciencesWiki : Open WebUI charge nativement /static/custom.css.
      - ./openwebui/custom.css:/app/backend/open_webui/static/custom.css:ro
    ports:
      # Open WebUI est PROXIFIÉ par Heimdall (chat.scienceswiki.eu) : il doit donc
      # écouter sur l'IP LAN de Thor (BIND_IP), sinon Heimdall ne le joint pas → 504.
      # ⚠️ L'accès DIRECT sur cette IP:port contourne le SSO (pas d'en-têtes X-SW-Auth-*)
      # → à DURCIR AU PARE-FEU : n'autoriser :8092 QUE depuis Heimdall (192.168.1.195).
      # (OPENWEBUI_BIND permet de forcer une autre IP ; défaut = BIND_IP comme api/web.)
      - "${OPENWEBUI_BIND:-${BIND_IP:-0.0.0.0}}:${OPENWEBUI_PORT:-8092}:8080"
    restart: unless-stopped

volumes:
  database_data:
  jwt_keys:
  secrets_vault:
  web_sessions:
  web_uploads:
  openwebui_data:
